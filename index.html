<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mobile Login • UI Design</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts for Instagram-like typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Custom animations and fine-tuning */
        @keyframes floatLabel {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(-24px) scale(0.85); }
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(145deg, #fafafa 0%, #f5f5f5 100%);
        }
        
        /* Floating label effect */
        .input-container {
            position: relative;
            margin-bottom: 16px;
        }
        
        .input-field {
            width: 100%;
            padding: 16px 12px 8px 12px;
            background-color: #fafafa;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.2s ease;
            outline: none;
        }
        
        .input-field:focus {
            border-color: #0095f6;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(0,149,246,0.1);
        }
        
        .floating-label {
            position: absolute;
            left: 12px;
            top: 14px;
            font-size: 14px;
            color: #8e8e8e;
            pointer-events: none;
            transition: all 0.15s ease-out;
            background: transparent;
            padding: 0 4px;
        }
        
        .input-field:focus + .floating-label,
        .input-field:not(:placeholder-shown) + .floating-label {
            transform: translateY(-18px) scale(0.85);
            color: #0095f6;
            background: linear-gradient(to bottom, #fafafa 50%, transparent 50%);
            font-weight: 500;
        }
        
        .input-field::placeholder {
            color: transparent;
        }
        
        /* Custom gradient for logo */
        .brand-gradient {
            background: linear-gradient(135deg, #405de6, #833ab4, #e1306c, #fd1d1d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        /* Button press effect */
        .btn-press {
            transition: transform 0.1s ease;
        }
        
        .btn-press:active {
            transform: scale(0.98);
        }
        
        /* Divider lines */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: #8e8e8e;
            font-size: 13px;
            font-weight: 500;
            margin: 24px 0;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #dbdbdb;
        }
        
        .divider::before {
            margin-right: 16px;
        }
        
        .divider::after {
            margin-left: 16px;
        }
        
        /* Custom scrollbar hide */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        /* Card shadow */
        .card-shadow {
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
        }
        
        /* Glass morphism effect for bottom section */
        .glass-effect {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.3);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 no-scrollbar">
    <!-- Main container - 375x812 viewport -->
    <div class="relative w-full max-w-[375px] h-[812px] bg-white rounded-3xl shadow-2xl overflow-hidden card-shadow">
        
        <!-- Status bar simulation -->
        <div class="flex justify-between items-center px-6 pt-3 pb-2 text-xs font-medium text-gray-600">
            <span>9:41</span>
            <div class="flex gap-1">
                <i class="fas fa-signal"></i>
                <i class="fas fa-wifi"></i>
                <i class="fas fa-battery-full"></i>
            </div>
        </div>
        
        <!-- Scrollable content area -->
        <div class="h-[calc(812px-48px)] overflow-y-auto no-scrollbar px-6 pb-8">
            
            <!-- Top spacing -->
            <div class="h-8"></div>
            
            <!-- Logo Section - Prominent central area -->
            <div class="flex flex-col items-center justify-center mb-10 animate-fade-in">
                <!-- Camera icon as design element -->
                <div class="w-20 h-20 bg-gradient-to-br from-purple-600 to-pink-600 rounded-2xl rotate-45 mb-6 flex items-center justify-center shadow-lg">
                    <i class="fas fa-camera-retro text-white text-3xl -rotate-45"></i>
                </div>
                <h1 class="text-4xl font-bold brand-gradient tracking-tight">PhotoShare</h1>
                <p class="text-gray-500 text-sm mt-2 font-medium">Share your moments</p>
            </div>
            
            <!-- Welcome back text -->
            <div class="mb-6">
                <h2 class="text-xl font-semibold text-gray-800">Welcome back</h2>
                <p class="text-gray-500 text-sm">Please enter your details</p>
            </div>
            
            <!-- Login Form -->
            <div class="space-y-4">
                <!-- Username/Email field with floating label -->
                <div class="input-container">
                    <input type="text" class="input-field" id="username" placeholder=" ">
                    <label for="username" class="floating-label">Username, email, or mobile</label>
                </div>
                
                <!-- Password field with floating label -->
                <div class="input-container">
                    <input type="password" class="input-field" id="password" placeholder=" ">
                    <label for="password" class="floating-label">Password</label>
                </div>
                
                <!-- Forgot password link -->
                <div class="text-right">
                    <a href="#" class="text-sm font-semibold text-[#0095f6] hover:opacity-80 transition">
                        Forgot password?
                    </a>
                </div>
                
                <!-- Log In Button - Primary brand color -->
                <button class="w-full bg-[#0095f6] hover:bg-[#1877f2] text-white font-bold py-3.5 px-4 rounded-xl mt-4 btn-press shadow-md transition-all duration-200 hover:shadow-lg">
                    Log In
                </button>
            </div>
            
            <!-- OR Divider -->
            <div class="divider">
                <span>OR</span>
            </div>
            
            <!-- Social Login Options -->
            <div class="space-y-3">
                <!-- Facebook style option -->
                <button class="w-full flex items-center justify-center gap-3 bg-[#f5f5f5] hover:bg-[#eee] text-gray-700 font-semibold py-3.5 px-4 rounded-xl btn-press transition-all border border-gray-200">
                    <i class="fab fa-facebook text-[#1877f2] text-xl"></i>
                    <span>Continue with Facebook</span>
                </button>
                
                <!-- Google style option -->
                <button class="w-full flex items-center justify-center gap-3 bg-white hover:bg-gray-50 text-gray-700 font-semibold py-3.5 px-4 rounded-xl btn-press transition-all border border-gray-200 shadow-sm">
                    <i class="fab fa-google text-[#DB4437] text-xl"></i>
                    <span>Continue with Google</span>
                </button>
                
                <!-- Apple style option (optional) -->
                <button class="w-full flex items-center justify-center gap-3 bg-black hover:bg-gray-900 text-white font-semibold py-3.5 px-4 rounded-xl btn-press transition-all shadow-sm">
                    <i class="fab fa-apple text-xl"></i>
                    <span>Continue with Apple</span>
                </button>
            </div>
            
            <!-- Bottom spacing -->
            <div class="h-8"></div>
        </div>
        
        <!-- Fixed bottom section for Sign Up - Glass morphism effect -->
        <div class="absolute bottom-0 left-0 right-0 glass-effect border-t border-gray-200">
            <div class="flex justify-center items-center py-4 px-6">
                <p class="text-gray-600 text-sm">
                    Don't have an account? 
                    <a href="#" class="font-bold text-[#0095f6] hover:opacity-80 transition ml-1">
                        Sign up
                    </a>
                </p>
            </div>
        </div>
        
        <!-- Home indicator (for realistic mobile feel) -->
        <div class="absolute bottom-1 left-1/2 transform -translate-x-1/2 w-32 h-1 bg-gray-300 rounded-full"></div>
    </div>
    
    <!-- Interactive Demo Script (optional - adds functionality) -->
    <script>
        // Floating labels animation enhancement
        document.querySelectorAll('.input-field').forEach(field => {
            field.addEventListener('focus', function() {
                this.parentElement.classList.add('focused');
            });
            
            field.addEventListener('blur', function() {
                if (!this.value) {
                    this.parentElement.classList.remove('focused');
                }
            });
        });
        
        // Demo alert for buttons
        const buttons = document.querySelectorAll('button, a[href="#"]');
        buttons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                if (btn.classList.contains('login-btn') || 
                    btn.closest('button') || 
                    btn.getAttribute('href') === '#') {
                    e.preventDefault();
                    alert('✨ UI Demo: This is a high-fidelity prototype');
                }
            });
        });
    </script>
    
    <!-- CSS for additional polish -->
    <style>
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .animate-fade-in {
            animation: fade-in 0.6s ease-out;
        }
        
        /* Smooth transitions */
        .input-field, button, a {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* Custom focus styles */
        .input-field:focus {
            border-width: 2px;
            padding-top: 15px;
            padding-bottom: 7px;
        }
        
        /* Better touch targets for mobile */
        button, a {
            min-height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Ripple effect simulation */
        .btn-press {
            position: relative;
            overflow: hidden;
        }
        
        .btn-press::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 5px;
            height: 5px;
            background: rgba(255,255,255,0.5);
            opacity: 0;
            border-radius: 100%;
            transform: scale(1, 1) translate(-50%);
            transform-origin: 50% 50%;
        }
        
        .btn-press:focus:not(:active)::after {
            animation: ripple 0.6s ease-out;
        }
        
        @keyframes ripple {
            0% {
                transform: scale(0, 0);
                opacity: 0.5;
            }
            100% {
                transform: scale(20, 20);
                opacity: 0;
            }
        }
    </style>
</body>
</html>
